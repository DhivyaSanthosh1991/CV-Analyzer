<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorkMoat — Discover where AI hits first</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --beige:    #F5F2EB;
    --beige-d:  #EDE9DF;
    --dark:     #2C2C2A;
    --mid:      #444441;
    --muted:    #888780;
    --border:   #D3D1C7;
    --green-bg: #EAF3DE; --green-tx: #3B6D11;
    --amber-bg: #FAEEDA; --amber-tx: #854F0B;
    --red-bg:   #FCEBEB; --red-tx:   #A32D2D;
    --blue-bg:  #E6F1FB; --blue-tx:  #185FA5;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--beige);
    color: var(--dark);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 40px;
    border-bottom: 0.5px solid var(--border);
    position: sticky; top: 0; background: var(--beige); z-index: 100;
  }
  .logo { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.1em; color: var(--muted); text-transform: lowercase; }

  /* HERO */
  .hero {
    text-align: center;
    padding: 80px 24px 60px;
    max-width: 700px; margin: 0 auto;
  }
  .hero-h {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(32px, 6vw, 54px);
    font-weight: 400; line-height: 1.2;
    color: var(--dark); margin-bottom: 20px;
  }
  .hero-h em { font-style: italic; }
  .hero-h .circle {
    display: inline-block;
    border: 1.5px solid var(--dark);
    border-radius: 50%;
    padding: 2px 10px;
  }
  .hero-sub { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; }

  /* UPLOAD CARD */
  .upload-card {
    background: #faf8f3;
    border: 0.5px solid var(--border);
    border-radius: 18px;
    padding: 32px 28px 28px;
    max-width: 480px; margin: 0 auto;
  }
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .drop-zone:hover, .drop-zone.drag-over { background: var(--beige-d); border-color: var(--muted); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .cloud-svg { width: 38px; margin: 0 auto 10px; opacity: 0.45; display: block; }
  .drop-label { font-size: 14px; font-weight: 500; color: var(--mid); }
  .drop-hint  { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .fname { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }
  .or-row { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
  .or-row::before, .or-row::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
  .or-row span { font-size: 12px; color: var(--muted); }
  textarea {
    width: 100%; resize: vertical; min-height: 110px;
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    padding: 10px 13px; border-radius: 10px;
    border: 0.5px solid var(--border); background: #faf8f3;
    color: var(--dark); outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--muted); }
  .job-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .field-group label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
  input[type=text] {
    width: 100%; font-size: 13px; font-family: 'DM Sans', sans-serif;
    padding: 8px 12px; border-radius: 10px;
    border: 0.5px solid var(--border); background: #faf8f3;
    color: var(--dark); outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--muted); }
  .btn-main {
    display: block; width: 100%; margin-top: 18px;
    background: var(--dark); color: var(--beige);
    border: none; border-radius: 10px;
    padding: 13px 24px; font-size: 14px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-main:hover { background: var(--mid); }
  .btn-main:active { transform: scale(0.98); }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

  /* RESULTS */
  #result-view { display: none; max-width: 760px; margin: 0 auto; padding: 0 20px 60px; }
  .result-header { text-align: center; padding: 40px 20px 30px; }
  .result-header .logo { margin-bottom: 8px; display: block; }
  .result-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; color: var(--dark); }
  .result-role { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .badge-free { font-size: 10px; padding: 2px 8px; border-radius: 100px; background: var(--green-bg); color: var(--green-tx); border: 0.5px solid #C0DD97; margin-left: 6px; vertical-align: middle; }
  .badge-paid { font-size: 10px; padding: 2px 8px; border-radius: 100px; background: var(--amber-bg); color: var(--amber-tx); border: 0.5px solid #FAC775; margin-left: 6px; vertical-align: middle; }

  .score-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .sc { background: #faf8f3; border: 0.5px solid var(--border); border-radius: 12px; padding: 16px 12px; text-align: center; }
  .sc-num { font-size: 30px; font-weight: 500; }
  .sc-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .sec-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 24px 0 8px; }
  .card { background: #faf8f3; border: 0.5px solid var(--border); border-radius: 14px; padding: 18px 18px 14px; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

  /* Bar */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .bar-lbl { width: 90px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .bar-track { flex: 1; height: 5px; background: var(--beige-d); border-radius: 3px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 3px; background: var(--dark); transition: width 0.8s ease; }
  .bar-val   { width: 28px; text-align: right; font-size: 11px; color: var(--muted); }

  /* Feedback rows */
  .fb-item { margin-bottom: 10px; }
  .fb-title { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .fb-body  { font-size: 12px; color: var(--mid); line-height: 1.6; }

  /* Chips */
  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .chip { font-size: 11px; padding: 3px 10px; border-radius: 100px; border: 0.5px solid var(--border); background: var(--beige-d); color: var(--muted); }
  .chip.green { background: var(--green-bg); color: var(--green-tx); border-color: #C0DD97; }
  .chip.amber { background: var(--amber-bg); color: var(--amber-tx); border-color: #FAC775; }
  .chip.red   { background: var(--red-bg);   color: var(--red-tx);   border-color: #F7C1C1; }
  .chip.blue  { background: var(--blue-bg);  color: var(--blue-tx);  border-color: #B5D4F4; }

  /* Risk level */
  .risk-badge { display: inline-block; font-size: 20px; font-weight: 500; text-transform: capitalize; }
  .risk-high   { color: var(--red-tx); }
  .risk-medium { color: var(--amber-tx); }
  .risk-low    { color: var(--green-tx); }

  /* Roadmap */
  .roadmap-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .roadmap-item:last-child { border-bottom: none; }
  .rm-priority { font-size: 9px; font-weight: 500; padding: 3px 8px; border-radius: 100px; flex-shrink: 0; height: fit-content; margin-top: 2px; text-transform: uppercase; }
  .rm-priority.high   { background: var(--red-bg);   color: var(--red-tx); }
  .rm-priority.medium { background: var(--amber-bg); color: var(--amber-tx); }
  .rm-priority.low    { background: var(--green-bg); color: var(--green-tx); }
  .rm-skill    { font-size: 13px; font-weight: 500; color: var(--dark); margin-bottom: 2px; }
  .rm-reason   { font-size: 12px; color: var(--mid); line-height: 1.5; margin-bottom: 3px; }
  .rm-resource { font-size: 11px; color: var(--muted); }

  /* Improvement */
  .imp-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); align-items: flex-start; }
  .imp-item:last-child { border-bottom: none; }
  .imp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .imp-dot.high   { background: var(--red-tx); }
  .imp-dot.medium { background: var(--amber-tx); }
  .imp-dot.low    { background: var(--green-tx); }
  .imp-text { font-size: 13px; color: var(--mid); line-height: 1.5; }

  /* Lock wall */
  .lock-wall {
    background: #faf8f3;
    border: 1.5px dashed var(--border);
    border-radius: 16px;
    padding: 36px 28px;
    text-align: center;
    margin: 24px 0;
  }
  .lock-icon { width: 36px; margin: 0 auto 12px; opacity: 0.35; display: block; }
  .lock-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; margin-bottom: 8px; }
  .lock-sub   { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; max-width: 380px; margin-left: auto; margin-right: auto; }
  .lock-features { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 380px; margin: 0 auto 24px; text-align: left; }
  .lf-item { font-size: 12px; color: var(--mid); display: flex; gap: 7px; align-items: flex-start; }
  .lf-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; margin-top: 5px; }
  .btn-pay {
    display: inline-block; background: var(--dark); color: var(--beige);
    border: none; border-radius: 10px; padding: 13px 36px;
    font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-pay:hover { background: var(--mid); }
  .price-note { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* Locked placeholders */
  .locked-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0; }
  .locked-card { background: #faf8f3; border: 0.5px dashed var(--border); border-radius: 14px; padding: 16px; opacity: 0.45; }
  .locked-ph   { height: 56px; background: var(--beige-d); border-radius: 8px; margin-top: 10px; }

  /* Loading */
  .loading { text-align: center; padding: 60px 20px; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--dark); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .reset-btn { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; display: block; text-align: center; margin: 8px auto 0; }

  .download-btn {
    display: block; width: 100%; margin-top: 12px;
    background: var(--green-bg); color: var(--green-tx);
    border: 0.5px solid #C0DD97; border-radius: 10px;
    padding: 12px 24px; font-size: 14px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    text-align: center; text-decoration: none;
  }

  @media (max-width: 560px) {
    nav { padding: 16px 20px; }
    .hero { padding: 50px 20px 40px; }
    .job-row { grid-template-columns: 1fr; }
    .two-col, .locked-grid, .lock-features { grid-template-columns: 1fr; }
    .score-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<nav>
  <span class="logo">workmoat.ai</span>
</nav>

<!-- ── INPUT VIEW ──────────────────────────────────────────────────────────── -->
<div id="input-view">
  <div class="hero">
    <h1 class="hero-h">
      Upload your CV.<br>
      <em>Discover where AI hits <span class="circle">first.</span></em>
    </h1>
    <p class="hero-sub">Get a free AI risk snapshot + full career protection report — personalised to your CV.</p>

    <div class="upload-card">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf,.docx,.txt" />
        <svg class="cloud-svg" viewBox="0 0 40 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 26V12M20 12L14 18M20 12L26 18" stroke="#2C2C2A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11 26H9a7 7 0 01-.5-13.97A9 9 0 0127.5 9.5 6.5 6.5 0 0131 22.5H29" stroke="#2C2C2A" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div class="drop-label">Drag and drop to upload</div>
        <div class="drop-hint">PDF, Word (.docx), or plain text</div>
      </div>
      <div id="fname" class="fname"></div>

      <div class="or-row"><span>or paste your CV</span></div>
      <textarea id="cv-text" placeholder="Paste your full CV here…"></textarea>

      <div class="job-row">
        <div class="field-group">
          <label for="job-title">Target job title</label>
          <input type="text" id="job-title" placeholder="e.g. Data Analyst" />
        </div>
        <div class="field-group">
          <label for="industry">Industry</label>
          <input type="text" id="industry" placeholder="e.g. Finance" />
        </div>
      </div>

      <button class="btn-main" id="analyse-btn" onclick="runAnalysis()">Analyse my CV</button>
    </div>
  </div>
</div>

<!-- ── RESULT VIEW ─────────────────────────────────────────────────────────── -->
<div id="result-view">
  <div id="result-content"></div>
  <button class="reset-btn" onclick="resetTool()">← Analyse another CV</button>
</div>

<script>
const API_BASE = '';  // same origin — Flask serves this
let fileContent = '';
let currentSessionId = null;
let currentResult = null;

// File upload
document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fname').textContent = '📎 ' + file.name;
  fileContent = await file.text().catch(() => '');
  if (fileContent) document.getElementById('cv-text').value = fileContent.slice(0, 5000);
});

// Drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', async e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    document.getElementById('fname').textContent = '📎 ' + file.name;
    fileContent = await file.text().catch(() => '');
    if (fileContent) document.getElementById('cv-text').value = fileContent.slice(0, 5000);
  }
});

async function runAnalysis() {
  const cv = document.getElementById('cv-text').value.trim() || fileContent;
  if (!cv || cv.length < 60) { alert('Please upload or paste your CV first.'); return; }

  document.getElementById('input-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
  document.getElementById('result-content').innerHTML =
    '<div class="loading"><span class="spinner"></span>Analysing your CV — this takes a few seconds…</div>';

  try {
    const res = await fetch(`${API_BASE}/api/analyse`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cv_text:   cv,
        job_title: document.getElementById('job-title').value.trim(),
        industry:  document.getElementById('industry').value.trim()
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    currentSessionId = data.session_id;
    currentResult    = data.preview;
    renderPreview(currentResult);
  } catch (e) {
    document.getElementById('result-content').innerHTML =
      `<div class="loading" style="color:var(--muted)">Something went wrong: ${e.message}</div>`;
  }
}

function color(score, invert = false) {
  if (invert) {
    if (score >= 70) return 'var(--red-tx)';
    if (score >= 40) return 'var(--amber-tx)';
    return 'var(--green-tx)';
  }
  if (score >= 70) return 'var(--green-tx)';
  if (score >= 40) return 'var(--amber-tx)';
  return 'var(--red-tx)';
}

function barFill(score) {
  if (score >= 70) return 'var(--green-tx)';
  if (score >= 40) return 'var(--amber-tx)';
  return 'var(--red-tx)';
}

function renderPreview(r) {
  const s = r.cv_sections || {};
  const sLabels = { contact_info:'Contact info', summary:'Summary', experience:'Experience', skills:'Skills', formatting:'Formatting' };
  const ar = r.automation_risk || {};
  const rb = r.role_breakdown  || {};
  const jf = r.job_fit         || {};
  const ov  = r.overall_score  || 0;
  const sus = r.ai_susceptibility_score || 0;
  const aug = r.ai_augment_score || 0;
  const riskClass = ar.level === 'high' ? 'risk-high' : ar.level === 'medium' ? 'risk-medium' : 'risk-low';

  let html = `
  <div class="result-header">
    <span class="logo">workmoat.ai</span>
    <div class="result-name">${r.name || 'Your CV'}</div>
    <div class="result-role">${r.role || '–'}</div>
  </div>

  <div class="score-row">
    <div class="sc"><div class="sc-num" style="color:${color(ov)}">${ov}</div><div class="sc-lbl">CV quality / 100</div></div>
    <div class="sc"><div class="sc-num" style="color:${color(sus,true)}">${sus}</div><div class="sc-lbl">AI susceptibility / 100</div></div>
    <div class="sc"><div class="sc-num" style="color:${color(aug)}">${aug}</div><div class="sc-lbl">AI augment score / 100</div></div>
    ${jf.score !== null && jf.score !== undefined ? `<div class="sc"><div class="sc-num" style="color:${color(jf.score)}">${jf.score}</div><div class="sc-lbl">Job fit / 100</div></div>` : ''}
  </div>

  <div class="sec-label">CV quality <span class="badge-free">free</span></div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">Section scores</div>
      ${Object.entries(sLabels).map(([k,lbl]) => {
        const v = (s[k]||{}).score || 0;
        return `<div class="bar-row">
          <span class="bar-lbl">${lbl}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${barFill(v)}"></div></div>
          <span class="bar-val">${v}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-title">Section feedback</div>
      ${Object.entries(sLabels).map(([k,lbl]) => {
        const sec = s[k] || {};
        const c = sec.status === 'good' ? 'var(--green-tx)' : sec.status === 'warn' ? 'var(--amber-tx)' : 'var(--blue-tx)';
        return `<div class="fb-item">
          <div class="fb-title" style="color:${c}">${lbl}</div>
          <div class="fb-body">${sec.feedback || '—'}</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  ${r.strengths && r.strengths.length ? `
  <div class="card" style="margin-bottom:12px">
    <div class="card-title">Key strengths</div>
    <div class="chip-row">${r.strengths.map(s => `<span class="chip green">${s}</span>`).join('')}</div>
  </div>` : ''}

  <div class="sec-label">AI risk snapshot <span class="badge-free">free</span></div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">Automation risk</div>
      <div class="risk-badge ${riskClass}">${ar.level || '—'}</div>
      <div style="font-size:12px;color:var(--muted);margin:4px 0 8px">Est. timeline: <strong style="color:var(--mid)">${ar.timeline || '—'}</strong></div>
      <div class="fb-body">${ar.summary || ''}</div>
    </div>
    <div class="card">
      <div class="card-title">Role breakdown (${rb.automation_pct || 0}% automatable)</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">At risk</div>
      <div class="chip-row" style="margin-bottom:10px">${(rb.automatable_tasks||[]).map(t=>`<span class="chip red">${t}</span>`).join('')}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Human-essential</div>
      <div class="chip-row">${(rb.human_tasks||[]).map(t=>`<span class="chip green">${t}</span>`).join('')}</div>
    </div>
  </div>

  ${jf.score !== null && jf.score !== undefined ? `
  <div class="card" style="margin-bottom:12px">
    <div class="card-title">Job fit analysis <span class="badge-free">free</span></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Matched skills</div>
    <div class="chip-row" style="margin-bottom:10px">${(jf.matched_skills||[]).map(s=>`<span class="chip green">${s}</span>`).join('')}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Skill gaps</div>
    <div class="chip-row">${(jf.missing_skills||[]).map(s=>`<span class="chip amber">${s}</span>`).join('')}</div>
  </div>` : ''}

  <div class="sec-label">Full report <span class="badge-paid">pay ₹199</span></div>
  <div class="locked-grid">
    ${['Strategic position','Upskilling roadmap','AI systems','CV improvements'].map(t=>`
    <div class="locked-card">
      <div class="card-title">${t}</div>
      <div class="locked-ph"></div>
    </div>`).join('')}
  </div>

  <div class="lock-wall">
    <svg class="lock-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="16" width="24" height="16" rx="4" stroke="#2C2C2A" stroke-width="1.5"/>
      <path d="M11 16V12a7 7 0 0114 0v4" stroke="#2C2C2A" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="18" cy="24" r="2.5" fill="#2C2C2A"/>
    </svg>
    <div class="lock-title">Unlock your full report</div>
    <div class="lock-sub">Get your complete AI displacement analysis, personalised upskilling roadmap, strategic position summary, and a downloadable PDF report.</div>
    <div class="lock-features">
      <div class="lf-item"><div class="lf-dot"></div><span>Strategic position & career moat</span></div>
      <div class="lf-item"><div class="lf-dot"></div><span>Upskilling roadmap (5 skills)</span></div>
      <div class="lf-item"><div class="lf-dot"></div><span>AI systems replacing your role</span></div>
      <div class="lf-item"><div class="lf-dot"></div><span>Top CV improvement actions</span></div>
      <div class="lf-item"><div class="lf-dot"></div><span>PDF report emailed to you</span></div>
      <div class="lf-item"><div class="lf-dot"></div><span>AI tools to augment your work</span></div>
    </div>
    <div style="max-width:320px;margin:0 auto 14px">
      <label for="pay-email" style="font-size:11px;color:var(--muted);display:block;text-align:left;margin-bottom:5px">Email address — we'll send the PDF here</label>
      <input type="email" id="pay-email" placeholder="you@example.com"
        style="width:100%;font-size:13px;font-family:'DM Sans',sans-serif;padding:10px 13px;border-radius:10px;border:0.5px solid var(--border);background:#faf8f3;color:var(--dark);outline:none;text-align:center" />
      <div id="email-error" style="font-size:11px;color:var(--red-tx);margin-top:4px;display:none">Please enter a valid email address.</div>
    </div>
    <button class="btn-pay" onclick="startPayment()">Get full report — ₹199</button>
    <div class="price-note">One-time · PDF emailed instantly · No subscription</div>
  </div>`;

  document.getElementById('result-content').innerHTML = html;
}

async function startPayment() {
  if (!currentSessionId) return;

  const emailInput = document.getElementById('pay-email');
  const emailError = document.getElementById('email-error');
  const email = (emailInput?.value || '').trim();

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    if (emailError) { emailError.style.display = 'block'; }
    if (emailInput) { emailInput.focus(); }
    return;
  }
  if (emailError) emailError.style.display = 'none';

  try {
    const res  = await fetch(`${API_BASE}/api/create-order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: currentSessionId, email })
    });
    const order = await res.json();
    if (order.error) throw new Error(order.error);

    const options = {
      key:         order.key,
      amount:      order.amount,
      currency:    order.currency,
      name:        'WorkMoat',
      description: 'Full CV & AI Risk Report',
      order_id:    order.order_id,
      prefill:     { name: currentResult?.name || '', email },
      handler: async function(response) {
        await verifyAndUnlock(response, email);
      },
      theme: { color: '#2C2C2A' }
    };
    const rzp = new Razorpay(options);
    rzp.open();
  } catch (e) {
    alert('Could not create payment order: ' + e.message);
  }
}

async function verifyAndUnlock(paymentResp, email) {
  try {
    const res  = await fetch(`${API_BASE}/api/verify-payment`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id:             currentSessionId,
        razorpay_payment_id:    paymentResp.razorpay_payment_id,
        razorpay_order_id:      paymentResp.razorpay_order_id,
        razorpay_signature:     paymentResp.razorpay_signature
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error('Verification failed');
    renderFullReport(data.paid_sections, data.download_url, data.email_sent, data.email);
  } catch (e) {
    alert('Payment verification failed: ' + e.message);
  }
}

function renderFullReport(paid, downloadUrl, emailSent, email) {
  const sp  = paid.strategic_position || '';
  const rm  = paid.upskilling_roadmap || [];
  const imp = paid.top_improvements   || [];
  const ais = paid.ai_systems         || {};

  const container     = document.getElementById('result-content');
  const lockSection   = container.querySelector('.lock-wall');
  const lockedSection = container.querySelector('.locked-grid');
  const secLabel      = lockedSection?.previousElementSibling;

  const emailBanner = emailSent
    ? `<div style="background:var(--green-bg);border:0.5px solid #C0DD97;border-radius:12px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><path d="M2 4l6 5 6-5M2 4h12v8H2V4z" stroke="#3B6D11" stroke-width="1.2" stroke-linejoin="round"/></svg>
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--green-tx)">Report sent to ${email}</div>
          <div style="font-size:11px;color:var(--green-tx);opacity:0.8;margin-top:2px">Check your inbox — the full PDF is attached. Check spam if you don't see it within a minute.</div>
        </div>
      </div>`
    : `<div style="background:var(--amber-bg);border:0.5px solid #FAC775;border-radius:12px;padding:14px 18px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:500;color:var(--amber-tx)">Email delivery unavailable</div>
        <div style="font-size:11px;color:var(--amber-tx);opacity:0.8;margin-top:2px">Please use the download button below to save your PDF report.</div>
      </div>`;

  let newHtml = `
  <div class="sec-label">Full report — unlocked</div>

  ${emailBanner}

  ${sp ? `<div class="card" style="margin-bottom:12px">
    <div class="card-title">Strategic position — your career moat</div>
    <div class="fb-body" style="font-size:13px;line-height:1.7">${sp}</div>
  </div>` : ''}

  ${ais.already_replacing?.length || ais.augmenting?.length ? `
  <div class="two-col" style="margin-bottom:12px">
    <div class="card">
      <div class="card-title">AI already replacing tasks</div>
      <div class="chip-row">${(ais.already_replacing||[]).map(t=>`<span class="chip red">${t}</span>`).join('')}</div>
    </div>
    <div class="card">
      <div class="card-title">AI tools to augment your work</div>
      <div class="chip-row">${(ais.augmenting||[]).map(t=>`<span class="chip blue">${t}</span>`).join('')}</div>
    </div>
  </div>` : ''}

  ${rm.length ? `<div class="card" style="margin-bottom:12px">
    <div class="card-title">Upskilling roadmap</div>
    ${rm.map(item => `
    <div class="roadmap-item">
      <span class="rm-priority ${item.priority}">${item.priority}</span>
      <div>
        <div class="rm-skill">${item.skill}</div>
        <div class="rm-reason">${item.reason}</div>
        <div class="rm-resource">Resources: ${item.resources || '–'}</div>
      </div>
    </div>`).join('')}
  </div>` : ''}

  ${imp.length ? `<div class="card" style="margin-bottom:12px">
    <div class="card-title">CV improvement suggestions</div>
    ${imp.map(item => `
    <div class="imp-item">
      <div class="imp-dot ${item.priority}"></div>
      <div class="imp-text">${item.suggestion}</div>
    </div>`).join('')}
  </div>` : ''}

  <a href="${downloadUrl}" class="download-btn" download>Download PDF report</a>`;

  if (lockedSection) lockedSection.remove();
  if (lockSection)   lockSection.outerHTML = newHtml;
  if (secLabel)      secLabel.remove();
}

function resetTool() {
  document.getElementById('input-view').style.display = 'block';
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('cv-text').value = '';
  document.getElementById('job-title').value = '';
  document.getElementById('industry').value = '';
  document.getElementById('fname').textContent = '';
  fileContent = ''; currentSessionId = null; currentResult = null;
}
</script>
</body>
</html>
